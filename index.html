<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>ぴよドローン スカイアタック</title>
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#8fd3ff;font-family:'BIZ UDPGothic','Hiragino Maru Gothic ProN',sans-serif;touch-action:none;overscroll-behavior:none;position:fixed;}
#game{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none;}
.chip{background:rgba(0,0,0,0.45);color:#fff;border-radius:14px;padding:6px 14px;font-weight:700;font-size:18px;line-height:1.3;}
#hud{position:fixed;top:calc(env(safe-area-inset-top,0px) + 10px);left:0;right:0;display:flex;justify-content:center;gap:10px;pointer-events:none;z-index:5;}
#mm{position:fixed;left:10px;top:calc(env(safe-area-inset-top,0px) + 10px);width:110px;height:110px;z-index:5;pointer-events:none;}
#spd{position:fixed;right:14px;top:calc(env(safe-area-inset-top,0px) + 10px);z-index:5;pointer-events:none;font-size:18px;}
.rbtn{position:fixed;z-index:6;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;touch-action:none;cursor:pointer;
  width:96px;height:96px;border-radius:50%;background:rgba(255,255,255,0.22);border:3px solid rgba(255,255,255,0.85);font-size:42px;
  bottom:calc(env(safe-area-inset-bottom,0px) + 26px);}
#btnL{left:20px;}
#btnR{left:132px;}
#btnU{right:20px;bottom:calc(env(safe-area-inset-bottom,0px) + 128px);}
#btnD{right:20px;}
#cd{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-size:110px;font-weight:700;color:#fff;text-shadow:0 4px 18px rgba(0,0,0,0.5);pointer-events:none;z-index:8;}
#popup{position:fixed;top:24%;left:0;right:0;text-align:center;font-size:34px;font-weight:700;color:#ffec6e;text-shadow:0 3px 10px rgba(0,0,0,0.6);pointer-events:none;opacity:0;transform:scale(0.9);transition:opacity .25s, transform .25s;z-index:8;}
#popup.show{opacity:1;transform:scale(1.08);}
.ov{position:fixed;inset:0;background:rgba(20,40,70,0.65);display:flex;align-items:center;justify-content:center;z-index:10;}
.panel{background:#fff;border-radius:24px;padding:30px 34px;text-align:center;max-width:88%;box-shadow:0 10px 40px rgba(0,0,0,0.35);}
.panel h1{font-size:32px;color:#2a7fe8;margin-bottom:8px;}
.panel p{font-size:17px;color:#444;margin:6px 0;}
.bigbtn{margin-top:16px;display:inline-block;background:#2a7fe8;color:#fff;font-size:24px;font-weight:700;padding:14px 46px;border-radius:40px;border:none;font-family:inherit;cursor:pointer;min-height:44px;}
.bigbtn:active{transform:scale(0.96);}
#resTimeBig{font-size:48px;font-weight:700;color:#2a7fe8;margin:8px 0;}
#resBest{font-size:20px;color:#e8a01e;font-weight:700;margin:4px 0;min-height:26px;}
.hidden{display:none !important;}
</style>
</head>
<body>
<canvas id="game"></canvas>
<canvas id="mm" width="220" height="220"></canvas>
<div id="hud">
  <div class="chip" id="lapEl">LAP 1/3</div>
  <div class="chip" id="timeEl">0:00.00</div>
  <div class="chip" id="starEl">⭐0</div>
</div>
<div class="chip" id="spd">0 km/h</div>
<div class="rbtn" id="btnL">◀</div>
<div class="rbtn" id="btnR">▶</div>
<div class="rbtn" id="btnU">▲</div>
<div class="rbtn" id="btnD">▼</div>
<div id="cd"></div>
<div id="popup"></div>
<div class="ov" id="titleOv">
  <div class="panel">
    <h1>🚁 ぴよドローン スカイアタック</h1>
    <p>空のコースを3しゅう！ タイムアタックだ！</p>
    <p>◀▶で左右、▲▼で上下にうごくよ(前には自動ですすむ)</p>
    <p>✨リングをくぐると<b>スピードアップ</b>！<br>🧱かべは よけよう！ ⭐スターもあつめてね</p>
    <p id="titleBest" style="color:#e8a01e;font-weight:700;"></p>
    <button class="bigbtn" id="btnStart">スタート！</button>
  </div>
</div>
<div class="ov hidden" id="resultOv">
  <div class="panel">
    <h1>🏁 ゴール！</h1>
    <div id="resTimeBig">0:00.00</div>
    <div id="resBest"></div>
    <p id="resStar">⭐ 0こ / 16こ</p>
    <p id="resRing">✨ リング 0回</p>
    <button class="bigbtn" id="btnAgain">もういちど</button>
  </div>
</div>
<script type="module">
// ぴよドローン スカイアタック v1.0 (2026-07-08)
// piyo-crossのu座標進行+ラップ判定 / drone-deliveryの機体ビジュアル
// 敵なしタイムアタック。前進自動+上下左右移動で「くぐる・よける・とる」
// 物理エンジン不使用 / dt 1/30クランプ(120Hz対応) / サウンドなし
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

// ===== 基本セットアップ =====
const canvas = document.getElementById('game');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x8fd3ff);
scene.fog = new THREE.Fog(0x8fd3ff, 130, 430);
const camera = new THREE.PerspectiveCamera(62, 1, 0.1, 900);
function onResize(){
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', onResize);
onResize();

scene.add(new THREE.HemisphereLight(0xcfe9ff, 0x8a7a55, 0.95));
const sun = new THREE.DirectionalLight(0xffffff, 1.05);
sun.position.set(90, 140, 50);
scene.add(sun);

// ===== ユーティリティ =====
const clamp = (v,a,b)=>Math.min(b,Math.max(a,v));
const wrap01 = v=>{ v%=1; if(v<0)v+=1; return v; };
const sstep = t=>{ t=clamp(t,0,1); return t*t*(3-2*t); };
const lerp = (a,b,t)=>a+(b-a)*t;
// -0.5〜0.5 の符号付きu差分
const uDiff = (a,b)=>{ let d = wrap01(a)-wrap01(b); if(d>0.5)d-=1; if(d<-0.5)d+=1; return d; };

// ===== 地形 =====
function terrainH(x,z){
  return 2.4*Math.sin(x*0.045)*Math.cos(z*0.038)
       + 1.5*Math.sin(x*0.09+1.7)*Math.sin(z*0.071+0.6)
       + 0.6*Math.sin(x*0.21+3.1)*Math.cos(z*0.19+1.2);
}
function grassBump(x,z){ return 0.16*Math.sin(x*1.15)*Math.sin(z*1.32); }

// ===== コース(CatmullRom閉曲線) =====
const ctrl = [[0,-95],[52,-88],[92,-52],[98,2],[70,42],[84,88],[40,112],[-12,96],[-44,62],[-88,72],[-114,30],[-98,-22],[-58,-42],[-72,-84],[-32,-104]];
const curve = new THREE.CatmullRomCurve3(
  ctrl.map(c=>new THREE.Vector3(c[0], terrainH(c[0],c[1]), c[1])),
  true, 'catmullrom', 0.5
);
const N = 800;
const samples = [];
let trackLen = 0;
{
  let prev = null;
  for(let i=0;i<N;i++){
    const u = i/N;
    const p = curve.getPoint(u);
    const t = curve.getTangent(u); t.y = 0; t.normalize();
    const left = new THREE.Vector3(t.z, 0, -t.x);
    if(prev) trackLen += p.distanceTo(prev);
    samples.push({u, pos:p, tan:t, left});
    prev = p;
  }
  trackLen += samples[N-1].pos.distanceTo(samples[0].pos);
}
function trackYat(u){
  const f = wrap01(u)*N, i = Math.floor(f)%N, j = (i+1)%N, t = f-i;
  return samples[i].pos.y*(1-t) + samples[j].pos.y*t;
}
const _sp = {x:0, z:0, tx:0, tz:0, lx:0, lz:0};
function samplePos(u, out){
  const f = wrap01(u)*N, i = Math.floor(f)%N, j = (i+1)%N, t = f-i;
  const a = samples[i], b = samples[j];
  out.x = a.pos.x*(1-t)+b.pos.x*t;
  out.z = a.pos.z*(1-t)+b.pos.z*t;
  out.tx = a.tan.x*(1-t)+b.tan.x*t;
  out.tz = a.tan.z*(1-t)+b.tan.z*t;
  out.lx = a.left.x*(1-t)+b.left.x*t;
  out.lz = a.left.z*(1-t)+b.left.z*t;
  return out;
}
// コース上(u, lat)の基準高さ: トラック高と地形高の高いほう
const _b = {x:0,z:0,tx:0,tz:0,lx:0,lz:0};
function baseAt(u, lat){
  samplePos(u, _b);
  const x = _b.x + _b.lx*lat, z = _b.z + _b.lz*lat;
  return Math.max(trackYat(u), terrainH(x,z)+grassBump(x,z));
}
function yawAt(u){ samplePos(u, _b); return Math.atan2(_b.tx, _b.tz); }

// ===== 地形メッシュ =====
{
  const T = 110, SZ = 390;
  const geo = new THREE.PlaneGeometry(SZ, SZ, T, T);
  geo.rotateX(-Math.PI/2);
  const pos = geo.attributes.position;
  const col = new Float32Array(pos.count*3);
  const tmp = new THREE.Color();
  for(let i=0;i<pos.count;i++){
    const x = pos.getX(i), z = pos.getZ(i);
    const h = terrainH(x,z)+grassBump(x,z);
    pos.setY(i, h);
    const g = clamp(0.62+h*0.05, 0.42, 0.85);
    tmp.setRGB(0.30*g, 0.55*g, 0.22*g);
    col[i*3] = tmp.r; col[i*3+1] = tmp.g; col[i*3+2] = tmp.b;
  }
  geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  geo.computeVertexNormals();
  scene.add(new THREE.Mesh(geo, new THREE.MeshLambertMaterial({vertexColors:true})));
}

// ===== ガイドの光の点(道路の代わりにコースを教える) =====
{
  const cnt = Math.floor(N/6);
  const dots = new THREE.InstancedMesh(new THREE.SphereGeometry(0.16, 8, 6),
    new THREE.MeshBasicMaterial({color:0xffffff, transparent:true, opacity:0.65}), cnt);
  const m = new THREE.Matrix4(), v = new THREE.Vector3();
  let k = 0;
  for(let i=0;i<N;i+=6){
    const s = samples[i];
    const y = baseAt(s.u, 0) + 0.6;
    m.setPosition(v.set(s.pos.x, y, s.pos.z));
    dots.setMatrixAt(k++, m);
  }
  scene.add(dots);
}

// ===== スタートゲート =====
{
  const s = samples[0];
  const yaw = yawAt(0);
  const baseY = baseAt(0, 0);
  const postG = new THREE.CylinderGeometry(0.25, 0.25, 7.5, 10);
  const postM = new THREE.MeshLambertMaterial({color:0xdddddd});
  for(const sd of [-1,1]){
    const p = new THREE.Mesh(postG, postM);
    p.position.set(s.pos.x+s.left.x*7.2*sd, baseY+3.75, s.pos.z+s.left.z*7.2*sd);
    scene.add(p);
  }
  const cv = document.createElement('canvas'); cv.width=512; cv.height=96;
  const cx = cv.getContext('2d');
  cx.fillStyle='#2a7fe8'; cx.fillRect(0,0,512,96);
  cx.fillStyle='#fff'; cx.font='bold 64px sans-serif'; cx.textAlign='center'; cx.textBaseline='middle';
  cx.fillText('START', 256, 50);
  const ban = new THREE.Mesh(new THREE.BoxGeometry(15.6, 1.6, 0.2), new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(cv)}));
  ban.position.set(s.pos.x, baseY+7.0, s.pos.z);
  ban.rotation.y = yaw;
  scene.add(ban);
}

// ===== 木・岩 =====
{
  const NT = 70, NR = 26;
  const trunks = new THREE.InstancedMesh(new THREE.CylinderGeometry(0.28,0.4,1.8,7), new THREE.MeshLambertMaterial({color:0x7a5230}), NT);
  const leaves = new THREE.InstancedMesh(new THREE.ConeGeometry(1.7,3.4,8), new THREE.MeshLambertMaterial({color:0x3f8f3f}), NT);
  const rocks = new THREE.InstancedMesh(new THREE.DodecahedronGeometry(0.9), new THREE.MeshLambertMaterial({color:0x9a9a9a}), NR);
  const m = new THREE.Matrix4(), q = new THREE.Quaternion(), up = new THREE.Vector3(0,1,0), v = new THREE.Vector3(), sc = new THREE.Vector3();
  // コースから離す判定用: サンプル総当たりだと重いので粗く
  function nearTrack(x, z){
    for(let i=0;i<N;i+=8){
      const s = samples[i];
      const dx = x-s.pos.x, dz = z-s.pos.z;
      if(dx*dx+dz*dz < 12*12) return true;
    }
    return false;
  }
  let pT = 0, pR = 0, guard = 0;
  while((pT<NT || pR<NR) && guard++<4000){
    const x = (Math.random()*2-1)*185, z = (Math.random()*2-1)*185;
    if(Math.hypot(x,z) > 185) continue;
    if(nearTrack(x, z)) continue;
    const h = terrainH(x,z)+grassBump(x,z);
    q.setFromAxisAngle(up, Math.random()*6.28);
    if(pT < NT){
      const s2 = 0.7+Math.random()*0.9;
      m.compose(v.set(x, h+0.9*s2, z), q, sc.set(s2,s2,s2)); trunks.setMatrixAt(pT, m);
      m.compose(v.set(x, h+3.4*s2, z), q, sc.set(s2,s2,s2)); leaves.setMatrixAt(pT, m);
      pT++;
    } else {
      const s2 = 0.5+Math.random()*1.1;
      m.compose(v.set(x, h+0.3*s2, z), q, sc.set(s2, s2*0.7, s2)); rocks.setMatrixAt(pR, m);
      pR++;
    }
  }
  scene.add(trunks); scene.add(leaves); scene.add(rocks);
}

// ===== 雲 =====
{
  const g = new THREE.SphereGeometry(1, 8, 6);
  const mat = new THREE.MeshBasicMaterial({color:0xffffff, transparent:true, opacity:0.9});
  for(let i=0;i<7;i++){
    const c = new THREE.Mesh(g, mat);
    c.position.set((Math.random()*2-1)*260, 55+Math.random()*30, (Math.random()*2-1)*260);
    c.scale.set(14+Math.random()*12, 4+Math.random()*2, 7+Math.random()*4);
    scene.add(c);
  }
}

// ===== ドローン機体(drone-deliveryビジュアル/前方=+Z) =====
function buildDrone(bodyColor, propColor){
  const g = new THREE.Group();
  g.rotation.order = 'YXZ';
  const inner = new THREE.Group();
  inner.scale.set(1.9, 1.9, 1.9);
  g.add(inner);
  const bodyMat = new THREE.MeshLambertMaterial({color:bodyColor});
  const armMat  = new THREE.MeshLambertMaterial({color:0x3a4a70});
  const core = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.16, 0.42), bodyMat);
  inner.add(core);
  const eye = new THREE.Mesh(new THREE.SphereGeometry(0.07, 12, 12), new THREE.MeshLambertMaterial({color:0x222233}));
  eye.position.set(0, 0, 0.24);
  inner.add(eye);
  const props = [];
  const offs = [[-0.32,-0.32],[0.32,-0.32],[-0.32,0.32],[0.32,0.32]];
  for(const [x,z] of offs){
    const arm = new THREE.Mesh(new THREE.BoxGeometry(0.34, 0.05, 0.08), armMat);
    arm.position.set(x*0.55, 0, z*0.55);
    arm.lookAt(new THREE.Vector3(x, 0, z).multiplyScalar(2));
    inner.add(arm);
    const prop = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.02, 0.06),
      new THREE.MeshLambertMaterial({color:propColor, transparent:true, opacity:0.85}));
    prop.position.set(x, 0.09, z);
    inner.add(prop);
    props.push(prop);
  }
  for(const sx of [-1,1]){
    const leg = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.14, 0.4), armMat);
    leg.position.set(sx*0.18, -0.16, 0);
    inner.add(leg);
  }
  scene.add(g);
  const sh = new THREE.Mesh(new THREE.CircleGeometry(0.95,14), new THREE.MeshBasicMaterial({color:0x000000, transparent:true, opacity:0.3, depthWrite:false}));
  sh.rotation.x = -Math.PI/2;
  scene.add(sh);
  return {group:g, props, shadow:sh};
}

// ===== ゲーム定数 =====
const BASE_SP = 25;         // 基本速度 m/s
const RING_BOOST_T = 1.5;   // リングブースト時間
const RING_BOOST_MULT = 1.4;
const FINISH_BOOST_T = 4.0; // フィニッシュブースト
const FINISH_BOOST_MULT = 1.7;
const LAT_MAX = 5.0;        // 横移動範囲
const ALT_MIN = 1.0, ALT_MAX = 6.0;
const LAT_SPEED = 5.0;      // 横移動速度 m/s
const ALT_SPEED = 3.6;      // 上下移動速度 m/s
const HIT_SLOW = 0.35;      // 衝突時の速度倍率
const HIT_COOL = 1.2;       // 衝突後の無敵時間
const BOB_AMP = 0.12;

// ===== コースオブジェクト定義 =====
// リング: u, lat, alt / final=true はゴール前3連続の対象
const RING_DEFS = [
  {u:0.05, lat: 0,   alt:2.0}, {u:0.10, lat:-3,   alt:1.6}, {u:0.16, lat: 3,   alt:3.2},
  {u:0.22, lat: 0,   alt:4.6}, {u:0.28, lat:-2,   alt:2.0}, {u:0.36, lat: 2,   alt:1.6},
  {u:0.42, lat: 0,   alt:3.6}, {u:0.50, lat:-3,   alt:2.6}, {u:0.56, lat: 3,   alt:4.2},
  {u:0.64, lat: 0,   alt:1.6}, {u:0.70, lat:-2,   alt:3.2}, {u:0.76, lat: 2,   alt:2.2},
  {u:0.90, lat: 0,   alt:2.6, final:true},
  {u:0.93, lat:-1.6, alt:2.6, final:true},
  {u:0.96, lat: 1.6, alt:2.6, final:true},
];
// バー障害物: kind 'high'(下をくぐる) / 'low'(上をこえる) / 'wall'(side側がふさがる: 1=左, -1=右)
const BAR_DEFS = [
  {u:0.13, kind:'high'}, {u:0.19, kind:'low'},  {u:0.32, kind:'wall', side: 1},
  {u:0.47, kind:'high'}, {u:0.53, kind:'low'},  {u:0.60, kind:'wall', side:-1},
  {u:0.73, kind:'high'}, {u:0.80, kind:'wall', side: 1}, {u:0.84, kind:'low'},
];
// スター: とるとカウント(1レース1回)
const STAR_DEFS = [
  [0.03, 2, 3.5],[0.075,-1.5,2.0],[0.135,0,1.5],[0.19,0,3.8],[0.25,2,4.5],
  [0.31,-3,2.0],[0.39,-2,2.8],[0.455,0,1.4],[0.52,2,3.5],[0.585,-2,1.8],
  [0.62,3,2.5],[0.67,0,4.8],[0.735,-3,3.0],[0.80,-3,2.0],[0.865,0,4.2],[0.915,1.5,1.6],
];
// 風ゾーン: u範囲と横に流す力(+が左方向)
const WIND_DEFS = [
  {a:0.24, b:0.30, push: 2.2},
  {a:0.66, b:0.72, push:-2.2},
];

// ===== オブジェクト生成 =====
const rings = RING_DEFS.map(d=>{
  const y = baseAt(d.u, d.lat) + d.alt;
  samplePos(d.u, _b);
  const mesh = new THREE.Mesh(new THREE.TorusGeometry(1.7, 0.18, 10, 28),
    new THREE.MeshLambertMaterial({color: d.final?0xffb63b:0x3be0c8, emissive: d.final?0xa06010:0x0a7a6a}));
  mesh.position.set(_b.x+_b.lx*d.lat, y, _b.z+_b.lz*d.lat);
  mesh.rotation.y = yawAt(d.u);
  scene.add(mesh);
  return {...d, mesh, takenLap:-1};
});
const bars = BAR_DEFS.map(d=>{
  samplePos(d.u, _b);
  const yaw = yawAt(d.u);
  const cx0 = _b.x, cz0 = _b.z, lx = _b.lx, lz = _b.lz;
  const base = baseAt(d.u, 0);
  const grp = new THREE.Group();
  const mat = new THREE.MeshLambertMaterial({color:0xe86a5a});
  const postM = new THREE.MeshLambertMaterial({color:0xbbbbbb});
  if(d.kind === 'high'){
    // 上の壁: alt 2.8〜6.6 をふさぐ → 下(低空)をくぐる
    const w = new THREE.Mesh(new THREE.BoxGeometry(LAT_MAX*2+2.4, 3.8, 0.5), mat);
    w.position.set(cx0, base+2.8+1.9, cz0);
    w.rotation.y = yaw; grp.add(w);
  } else if(d.kind === 'low'){
    // 下の壁: alt 0〜2.3 をふさぐ → 上をこえる
    const w = new THREE.Mesh(new THREE.BoxGeometry(LAT_MAX*2+2.4, 2.3, 0.5), mat);
    w.position.set(cx0, base+1.15, cz0);
    w.rotation.y = yaw; grp.add(w);
  } else {
    // 半分の壁: side側(lat*side > -0.4)をふさぐ → 反対側へよける
    const w = new THREE.Mesh(new THREE.BoxGeometry(LAT_MAX+1.8, 6.2, 0.5), mat);
    const off = (LAT_MAX+1.8)/2 - 0.4;
    w.position.set(cx0+lx*off*d.side, base+3.1, cz0+lz*off*d.side);
    w.rotation.y = yaw; grp.add(w);
  }
  // 両端の支柱
  for(const sd of [-1,1]){
    const p = new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.18,7.0,8), postM);
    p.position.set(cx0+lx*(LAT_MAX+1.4)*sd, base+3.5, cz0+lz*(LAT_MAX+1.4)*sd);
    grp.add(p);
  }
  scene.add(grp);
  return {...d, grp, hitLap:-1};
});
const stars = STAR_DEFS.map(([u,lat,alt])=>{
  const y = baseAt(u, lat) + alt;
  samplePos(u, _b);
  const mesh = new THREE.Mesh(new THREE.OctahedronGeometry(0.5),
    new THREE.MeshLambertMaterial({color:0xffd94a, emissive:0x9a7a10}));
  mesh.position.set(_b.x+_b.lx*lat, y, _b.z+_b.lz*lat);
  scene.add(mesh);
  return {u, lat, alt, mesh, taken:false};
});
// 風ゾーンの見た目: 半透明の帯+流れる矢印スプライト
const windArrows = [];
for(const w of WIND_DEFS){
  const segs = 7;
  for(let i=0;i<=segs;i++){
    const u = w.a + (w.b-w.a)*i/segs;
    samplePos(u, _b);
    const plane = new THREE.Mesh(new THREE.PlaneGeometry(LAT_MAX*2+3, 5.6),
      new THREE.MeshBasicMaterial({color:0x9adfff, transparent:true, opacity:0.14, side:THREE.DoubleSide, depthWrite:false}));
    plane.position.set(_b.x, baseAt(u,0)+3.4, _b.z);
    plane.rotation.y = yawAt(u);
    scene.add(plane);
  }
  for(let i=0;i<8;i++){
    const sp = new THREE.Sprite(new THREE.SpriteMaterial({color:0xffffff, transparent:true, opacity:0.5}));
    sp.scale.set(0.7, 0.25, 1);
    const u = w.a + Math.random()*(w.b-w.a);
    windArrows.push({sp, zone:w, u, lat:(Math.random()*2-1)*LAT_MAX, alt:1.5+Math.random()*3.5});
    scene.add(sp);
  }
}

// ===== プレイヤー =====
const pv = buildDrone(0xffb63b, 0xeeeeee);
const player = {uTotal:0, u:0, prevU:0, lat:0, alt:2.0, speed:0,
  lap:0, cp:false, finished:false,
  boostT:0, boostMult:1, hitCool:0, wobble:0,
  ringCount:0, starCount:0, finalStreak:0,
  pitch:0, roll:0, x:0, y:0, z:0, heading:0, inWind:false};

// ===== 状態 =====
let state = 'title', raceTime = 0, countT = 0, lastCount = -1;
let firstCam = true;
const START_U = (N-12)/N;

// 自己ベスト(localStorageは使えない環境もあるためtry/catch)
const BEST_KEY = 'piyoDroneSkyAttackBest';
function loadBest(){ try{ const v = parseFloat(localStorage.getItem(BEST_KEY)); return isFinite(v)?v:null; }catch(e){ return null; } }
function saveBest(t){ try{ localStorage.setItem(BEST_KEY, String(t)); }catch(e){} }

function placeRacer(){
  Object.assign(player, {uTotal:START_U, u:START_U, prevU:START_U, lat:0, alt:2.0, speed:0,
    lap:0, cp:false, finished:false, boostT:0, boostMult:1, hitCool:0, wobble:0,
    ringCount:0, starCount:0, finalStreak:0, pitch:0, roll:0, inWind:false});
  for(const r of rings){ r.takenLap = -1; r.mesh.visible = true; }
  for(const s of stars){ s.taken = false; s.mesh.visible = true; }
}
function resetRace(){
  placeRacer();
  raceTime = 0;
  document.getElementById('resultOv').classList.add('hidden');
  state = 'count'; countT = 3.4; lastCount = 99;
}
placeRacer();

// ===== 入力(上下左右のみ) =====
const input = {left:false, right:false, up:false, down:false};
function bindHold(id, prop){
  const el = document.getElementById(id);
  const on = e=>{ e.preventDefault(); input[prop] = true; };
  const off = ()=>{ input[prop] = false; };
  el.addEventListener('pointerdown', on);
  el.addEventListener('pointerup', off);
  el.addEventListener('pointercancel', off);
  el.addEventListener('pointerleave', off);
}
bindHold('btnL','left'); bindHold('btnR','right');
bindHold('btnU','up'); bindHold('btnD','down');
window.addEventListener('keydown', e=>{
  if(e.key==='ArrowLeft'){ input.left = true; e.preventDefault(); }
  if(e.key==='ArrowRight'){ input.right = true; e.preventDefault(); }
  if(e.key==='ArrowUp'){ input.up = true; e.preventDefault(); }
  if(e.key==='ArrowDown'){ input.down = true; e.preventDefault(); }
});
window.addEventListener('keyup', e=>{
  if(e.key==='ArrowLeft') input.left = false;
  if(e.key==='ArrowRight') input.right = false;
  if(e.key==='ArrowUp') input.up = false;
  if(e.key==='ArrowDown') input.down = false;
});

// ===== iPad Safariのジェスチャー無効化(ダブルタップ拡大の防止) =====
document.addEventListener('touchmove', e=>e.preventDefault(), {passive:false});
let lastTouchEnd = 0;
document.addEventListener('touchend', e=>{
  const now = Date.now();
  if(now - lastTouchEnd < 350) e.preventDefault();
  lastTouchEnd = now;
}, {passive:false});
document.addEventListener('gesturestart', e=>e.preventDefault());
document.addEventListener('gesturechange', e=>e.preventDefault());
document.addEventListener('gestureend', e=>e.preventDefault());
document.addEventListener('dblclick', e=>e.preventDefault());
document.addEventListener('contextmenu', e=>e.preventDefault());

// ===== ポップアップ =====
const popupEl = document.getElementById('popup');
let popTimer = null;
function popup(txt){
  popupEl.textContent = txt;
  popupEl.classList.add('show');
  clearTimeout(popTimer);
  popTimer = setTimeout(()=>popupEl.classList.remove('show'), 1300);
}

// ===== 通過判定(u跨ぎ) =====
// prev→now でobsUを跨いだか(前進のみ想定)
function crossed(prevU, nowU, obsU){
  const dPrev = uDiff(obsU, prevU);   // 進行方向にどれだけ先か
  const dNow  = uDiff(obsU, nowU);
  return dPrev > 0 && dNow <= 0 && dPrev < 0.05;
}

// ===== プレイヤー更新 =====
function updatePlayer(dt, t){
  const racing = state === 'race';
  const lx = (input.right?1:0) - (input.left?1:0);   // 右+
  const ly = (input.up?1:0) - (input.down?1:0);
  if(racing && !player.finished){
    player.lat = clamp(player.lat + lx*LAT_SPEED*dt, -LAT_MAX, LAT_MAX);
    player.alt = clamp(player.alt + ly*ALT_SPEED*dt, ALT_MIN, ALT_MAX);
  }
  // 風ゾーン: 横に流される
  let inWind = false;
  if(racing && !player.finished){
    for(const w of WIND_DEFS){
      if(uDiff(player.u, w.a) >= 0 && uDiff(w.b, player.u) >= 0){
        player.lat = clamp(player.lat + w.push*dt, -LAT_MAX, LAT_MAX);
        inWind = true;
      }
    }
  }
  if(inWind && !player.inWind) popup('💨 かぜに ながされる！');
  player.inWind = inWind;
  // 速度
  if(player.boostT > 0){ player.boostT -= dt; if(player.boostT <= 0) player.boostMult = 1; }
  if(player.hitCool > 0) player.hitCool -= dt;
  if(player.wobble > 0) player.wobble = Math.max(0, player.wobble - dt*1.4);
  if(racing && !player.finished){
    const target = BASE_SP * player.boostMult;
    player.speed += (target - player.speed) * 1.6 * dt;
  } else {
    player.speed = Math.max(0, player.speed - 14*dt);
  }
  // u進行
  player.prevU = player.u;
  player.uTotal += player.speed/trackLen*dt;
  player.u = wrap01(player.uTotal);
  // 判定(レース中のみ)
  if(racing && !player.finished){
    // リング
    for(const r of rings){
      if(crossed(player.prevU, player.u, r.u)){
        const d = Math.hypot(player.lat - r.lat, player.alt - r.alt);
        if(r.takenLap !== player.lap && d < 1.7){
          r.takenLap = player.lap;
          player.ringCount++;
          player.boostT = RING_BOOST_T; player.boostMult = RING_BOOST_MULT;
          if(r.final){
            player.finalStreak++;
            if(player.finalStreak >= 3){
              player.boostT = FINISH_BOOST_T; player.boostMult = FINISH_BOOST_MULT;
              popup('🔥 フィニッシュブースト！！');
            } else popup('✨ あと'+(3-player.finalStreak)+'つ！');
          } else popup('✨ リングボーナス！');
        } else if(r.final && r.takenLap !== player.lap){
          player.finalStreak = 0; // ゴール前リングを逃した
        }
      }
    }
    // バー障害物
    for(const b of bars){
      if(crossed(player.prevU, player.u, b.u) && player.hitCool <= 0){
        let hit = false;
        if(b.kind === 'high') hit = player.alt > 2.6;
        else if(b.kind === 'low') hit = player.alt < 2.5;
        else hit = player.lat * b.side > -0.4;
        if(hit){
          player.speed *= HIT_SLOW;
          player.hitCool = HIT_COOL;
          player.wobble = 1;
          player.finalStreak = 0;
          popup('💥 ぶつかった！');
        }
      }
    }
    // スター
    for(const s of stars){
      if(!s.taken && crossed(player.prevU, player.u, s.u)){
        if(Math.hypot(player.lat - s.lat, player.alt - s.alt) < 1.5){
          s.taken = true;
          s.mesh.visible = false;
          player.starCount++;
          popup('⭐ スター '+player.starCount+'こ！');
        }
      }
    }
    // ラップ判定(piyo-cross同様)
    if(player.u > 0.45 && player.u < 0.6) player.cp = true;
    if(player.prevU > 0.9 && player.u < 0.1 && player.cp){
      player.lap++;
      player.cp = false;
      player.finalStreak = 0;
      if(player.lap >= 3) finishPlayer();
      else popup('ラップ '+(player.lap+1)+'/3！');
    }
  }
  // ワールド座標
  samplePos(player.u, _sp);
  player.x = _sp.x + _sp.lx*player.lat;
  player.z = _sp.z + _sp.lz*player.lat;
  const bob = BOB_AMP*Math.sin(t*2.1);
  player.y = baseAt(player.u, player.lat) + player.alt + bob;
  player.heading = Math.atan2(_sp.tx, _sp.tz);
  // 姿勢演出: 横移動でロール、上下でピッチ、衝突でぐらつき
  const shake = player.wobble>0 ? Math.sin(t*30)*player.wobble*0.45 : 0;
  player.roll = lerp(player.roll, -lx*0.45, 1-Math.exp(-8*dt));
  const targetPitch = clamp(player.speed*0.008, 0, 0.28) - ly*0.22;
  player.pitch = lerp(player.pitch, targetPitch, 1-Math.exp(-6*dt));
  const g = pv.group;
  g.position.set(player.x, player.y, player.z);
  g.rotation.y = player.heading;
  g.rotation.x = player.pitch;
  g.rotation.z = player.roll + shake;
  const spin = (28 + player.speed*0.9)*dt;
  for(let i=0;i<pv.props.length;i++) pv.props[i].rotation.y += spin*(i%2===0?1:-1);
  const gy = player.y - player.alt - bob;
  pv.shadow.position.set(player.x, gy+0.06, player.z);
  pv.shadow.material.opacity = 0.3*clamp(1-player.alt*0.1, 0.12, 1);
}

// ===== ゴール =====
function finishPlayer(){
  player.finished = true;
  state = 'finished';
  const best = loadBest();
  const isBest = best===null || raceTime < best;
  if(isBest) saveBest(raceTime);
  document.getElementById('resTimeBig').textContent = fmtTime(raceTime);
  document.getElementById('resBest').textContent = isBest ? '🎉 自己ベスト更新！' : ('自己ベスト '+fmtTime(best));
  document.getElementById('resStar').textContent = '⭐ '+player.starCount+'こ / '+stars.length+'こ';
  document.getElementById('resRing').textContent = '✨ リング '+player.ringCount+'回';
  setTimeout(()=>document.getElementById('resultOv').classList.remove('hidden'), 900);
}
function fmtTime(t){
  const m = Math.floor(t/60), s = Math.floor(t%60), c = Math.floor((t*100)%100);
  return m+':'+String(s).padStart(2,'0')+'.'+String(c).padStart(2,'0');
}

// ===== ミニマップ =====
const mmC = document.getElementById('mm').getContext('2d');
let mmPts = null, mmB = null;
{
  let minX=1e9, maxX=-1e9, minZ=1e9, maxZ=-1e9;
  for(const s of samples){
    minX = Math.min(minX, s.pos.x); maxX = Math.max(maxX, s.pos.x);
    minZ = Math.min(minZ, s.pos.z); maxZ = Math.max(maxZ, s.pos.z);
  }
  const pad = 14, W = 220;
  const sc = Math.min((W-pad*2)/(maxX-minX), (W-pad*2)/(maxZ-minZ));
  mmB = {minX, minZ, sc, pad};
  mmPts = samples.filter((_,i)=>i%8===0).map(s=>[pad+(s.pos.x-minX)*sc, pad+(s.pos.z-minZ)*sc]);
}
function mmXY(x, z){ return [mmB.pad+(x-mmB.minX)*mmB.sc, mmB.pad+(z-mmB.minZ)*mmB.sc]; }
function drawMM(){
  mmC.clearRect(0, 0, 220, 220);
  mmC.beginPath();
  mmPts.forEach((p,i)=>{ if(i===0) mmC.moveTo(p[0],p[1]); else mmC.lineTo(p[0],p[1]); });
  mmC.closePath();
  mmC.lineWidth = 8; mmC.strokeStyle = 'rgba(0,0,0,0.35)'; mmC.stroke();
  mmC.lineWidth = 4.5; mmC.strokeStyle = '#7ab0e8'; mmC.stroke();
  const [px, py] = mmXY(player.x, player.z);
  mmC.fillStyle = '#fff';
  mmC.beginPath(); mmC.arc(px, py, 7.5, 0, 6.284); mmC.fill();
  mmC.fillStyle = '#ffb63b';
  mmC.beginPath(); mmC.arc(px, py, 4.5, 0, 6.284); mmC.fill();
}

// ===== カメラ =====
const camLook = new THREE.Vector3();
function updateCamera(dt){
  if(state === 'title'){
    const t = performance.now()*0.001;
    const ang = t*0.08;
    camera.position.set(Math.sin(ang)*140, 60, Math.cos(ang)*140);
    camera.lookAt(0, 0, 0);
    return;
  }
  const dirX = Math.sin(player.heading), dirZ = Math.cos(player.heading);
  const tx = player.x-dirX*9, tz = player.z-dirZ*9;
  const gh = terrainH(tx,tz)+grassBump(tx,tz);
  const ty = Math.max(player.y+3.4, gh+1.6);
  if(firstCam){
    camera.position.set(tx, ty, tz);
    firstCam = false;
  } else {
    const k = 1-Math.exp(-5*dt);
    camera.position.x += (tx-camera.position.x)*k;
    camera.position.y += (ty-camera.position.y)*k;
    camera.position.z += (tz-camera.position.z)*k;
  }
  camLook.set(player.x+dirX*5, player.y+1.0, player.z+dirZ*5);
  camera.lookAt(camLook);
}

// ===== HUD =====
const lapEl = document.getElementById('lapEl');
const timeEl = document.getElementById('timeEl');
const starEl = document.getElementById('starEl');
const spdEl = document.getElementById('spd');
function updateHUD(){
  lapEl.textContent = 'LAP '+Math.min(player.lap+1, 3)+'/3';
  timeEl.textContent = fmtTime(raceTime);
  starEl.textContent = '⭐'+player.starCount;
  spdEl.textContent = Math.round(player.speed*3.6)+' km/h';
}

// ===== 開始ボタン =====
function showTitleBest(){
  const best = loadBest();
  document.getElementById('titleBest').textContent = best!==null ? '自己ベスト '+fmtTime(best) : '';
}
showTitleBest();
document.getElementById('btnStart').addEventListener('click', ()=>{
  document.getElementById('titleOv').classList.add('hidden');
  resetRace();
  firstCam = true;
});
document.getElementById('btnAgain').addEventListener('click', ()=>{
  resetRace();
  firstCam = true;
});

// ===== メインループ =====
const clock = new THREE.Clock();
const cdEl = document.getElementById('cd');
function loop(){
  requestAnimationFrame(loop);
  const dt = Math.min(clock.getDelta(), 1/30); // 120Hz iPad対応クランプ
  const t = clock.elapsedTime;
  if(state === 'count'){
    countT -= dt;
    const n = Math.ceil(countT);
    if(n !== lastCount){
      lastCount = n;
      if(n > 0) cdEl.textContent = n;
      else {
        cdEl.textContent = 'GO!';
        state = 'race';
        setTimeout(()=>{ cdEl.textContent = ''; }, 700);
      }
    }
  }
  if(state === 'race') raceTime += dt;
  updatePlayer(dt, t);
  // オブジェクトのアニメーション
  for(const r of rings){
    const active = r.takenLap !== player.lap;
    r.mesh.visible = true;
    const sc = active ? 1 + 0.06*Math.sin(t*4 + r.u*40) : 0.55;
    r.mesh.scale.set(sc, sc, sc);
    r.mesh.material.opacity = 1;
  }
  for(const s of stars){
    if(!s.taken){ s.mesh.rotation.y += dt*2.2; s.mesh.rotation.x = 0.6; }
  }
  for(const a of windArrows){
    a.lat += a.zone.push*dt*1.6;
    if(a.zone.push > 0 && a.lat > LAT_MAX) a.lat = -LAT_MAX;
    if(a.zone.push < 0 && a.lat < -LAT_MAX) a.lat = LAT_MAX;
    samplePos(a.u, _b);
    a.sp.position.set(_b.x+_b.lx*a.lat, baseAt(a.u, a.lat)+a.alt, _b.z+_b.lz*a.lat);
  }
  updateCamera(dt);
  updateHUD();
  drawMM();
  renderer.render(scene, camera);
}
loop();
</script>
